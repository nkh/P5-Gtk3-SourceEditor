# =============================================================================
# Gtk3::SourceEditor — Configuration File
# =============================================================================
#
# Format: key = value  (leading/trailing whitespace around key and value is
# trimmed).  Lines starting with '#' are comments.  Blank lines are ignored.
#
# Boolean values accept: true/false, yes/no, 1/0  (case-insensitive).
# Numeric values are automatically converted to numbers.
# Values containing spaces may be enclosed in double quotes:
#     font_family = "DejaVu Sans Mono"
#
# Paths are relative to the directory containing this config file unless
# an absolute path is given.
#
# This file is parsed by Gtk3::SourceEditor::Config (see Config.pm for API).
#
# =============================================================================


# ----- Theme ----------------------------------------------------------------

# Built-in theme name (default, dark, light, solarized).  Alternatively, set
# theme_file below to point directly at an XML file.
theme = dark

# Explicit path to a GtkSourceView XML theme file.  When set, this takes
# precedence over the theme name above.
# theme_file = themes/theme_dark.xml


# ----- Font -----------------------------------------------------------------

# Font family for the editor widget.  Any Pango font family name is accepted.
font_family = Monospace

# Font size in points.  Set to 0 to use the system default monospace size.
font_size = 12


# ----- Editor behavior ------------------------------------------------------

# Enable word-wrap (long lines wrap at word boundaries).  When false, long
# lines scroll horizontally.
wrap = true

# Open the buffer in read-only mode.  Insert and replace modes are blocked;
# navigation and search still work.
read_only = false

# Enable Vim-like modal keybindings (Normal, Insert, Replace, Visual,
# Command modes).  When false, native GTK keybindings are used instead.
vim_mode = true

# Display line numbers in the left gutter.
show_line_numbers = true

# Highlight the background of the line containing the cursor.
highlight_current_line = true

# Automatically indent new lines to match the indentation of the previous line.
auto_indent = true

# Width of a tab stop, expressed in character columns.
tab_width = 8

# Number of spaces inserted by the auto-indent feature.
indent_width = 8

# When true, the Tab key inserts spaces instead of a literal tab character.
insert_spaces_instead_of_tabs = false

# Smart Home/End: first press moves to the first/last non-whitespace character;
# second press moves to the actual line start/end.
smart_home_end = true

# Show a vertical guide line at the right margin.
show_right_margin = false

# Column position of the right margin guide line (only visible when
# show_right_margin is true).
right_margin_position = 80

# Highlight the bracket matching the one under or adjacent to the cursor.
highlight_matching_brackets = true

# Display the line-marks gutter (used by bookmarks, breakpoints, etc.).
show_line_marks = false


# ----- Cursor ---------------------------------------------------------------

# Use a solid block cursor instead of the default i-beam.  The block cursor
# is drawn via Cairo and only available when vim mode is active.
block_cursor = false


# ----- Language -------------------------------------------------------------

# Override automatic syntax-highlighting detection.  Set to a GtkSourceView
# language ID (e.g. perl, python, c, javascript, xml, json, sql, sh).
# Leave empty to use auto-detection based on file extension and MIME type.
force_language = perl


# ----- Clipboard ------------------------------------------------------------

# Use the system clipboard for yank (copy) and paste operations.  When false,
# yanked text is stored in an internal register only.
use_clipboard = true


# ----- Tab string -----------------------------------------------------------

# The string inserted when the Tab key is pressed.  Use \t for a literal tab
# character, or specify a number of spaces (e.g. "    " for 4 spaces).
# This value is passed directly to the VimBindings layer.
tab_string = \t


# ----- Scrolling ------------------------------------------------------------

# Scroll mode controls how the viewport follows the cursor during vertical
# navigation in normal mode.  Three modes are available:
#
#   edge (default)  — cursor moves freely within the viewport; scrolling only
#     starts when the cursor reaches the top or bottom edge.  This matches the
#     standard GTK text widget behavior and is comfortable for most editing.
#
#   center          — cursor stays vertically centered in the viewport while
#     navigating.  Near the beginning or end of the buffer, GTK automatically
#     relaxes centering so the cursor can reach the first/last lines.  This is
#     useful for reading code or following long functions.
#
# scroll_lock is a runtime-only mode toggled by the zx binding.  It freezes
# the cursor at its current screen position and scrolls the buffer underneath
# when pressing j/k (or arrow keys).  Press zx again to deactivate and
# restore the previous scroll mode (edge or center).
#
# Valid values: edge, center
scroll_mode = edge

# Minimum number of context lines to keep above/below the cursor.  When set
# to a positive integer, scrolling ensures at least N lines of padding
# around the cursor.  Takes precedence over scroll_mode when set.
# Set to 0 or comment out to use scroll_mode instead.
# scrolloff = 0
